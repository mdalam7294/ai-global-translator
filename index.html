<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global AI Bridge | Md Alam Solutions</title>
    
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --primary: #00a884; --bg: #0b141a; --panel: #111b21; --accent: #007bff; --text: #e9edef; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; text-align: center; }
        
        header { 
            background: var(--panel); 
            padding: 15px; 
            border-bottom: 2px solid var(--primary); 
            display: flex; justify-content: space-between; align-items: center;
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-left img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }
        .header-right { font-size: 0.9rem; color: var(--primary); font-weight: 600; }

        .container { padding: 15px; max-width: 1250px; margin: auto; }
        
        .stats-bar { display: flex; justify-content: space-around; background: #1e293b; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-size: 0.85rem; }
        .stat-item span { color: var(--primary); font-weight: bold; }

        /* Controls Section */
        .controls { background: var(--panel); padding: 20px; border-radius: 15px; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        
        /* Client Hide Logic */
        .host-only { display: block; }
        .client-view .host-only { display: none !important; }

        input, select, button { padding: 12px; border-radius: 8px; border: 1px solid #2a3942; background: #2a3942; color: white; font-size: 13px; outline: none; }
        
        button { background: var(--accent); border: none; font-weight: 600; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 5px; }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-wa { background: var(--primary); }
        .btn-rec { background: transparent; border: 1px solid white; }
        .recording { background: #dc3545 !important; animation: blink 1s infinite; }

        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .video-wrapper { background: #000; border-radius: 15px; aspect-ratio: 16/9; position: relative; overflow: hidden; border: 2px solid #222e35; }
        .tag { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 3px 10px; border-radius: 5px; font-size: 0.75rem; color: var(--primary); font-weight: bold; z-index: 10; }

        #transBox { background: rgba(0,0,0,0.4); padding: 20px; border-radius: 12px; margin-top: 20px; border-left: 5px solid var(--primary); }
        #transText { color: #00ffcc; font-size: 1.6rem; font-weight: 600; text-shadow: 0 0 8px rgba(0,255,204,0.3); }

        @keyframes blink { 50% { opacity: 0.6; } }
        @media (max-width: 800px) { .video-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body id="mainBody">

<header>
    <div class="header-left">
        <img src="https://i.ibb.co/vzYp6YV/office-logo.jpg" alt="Logo">
        <div style="text-align: left;">
            <h2 style="margin:0; font-size: 1.2rem;">Global AI Bridge</h2>
            <p style="margin:0; font-size: 0.7rem; color: #8696a0;">Md Alam AI Solutions</p>
        </div>
    </div>
    <div class="header-right" id="liveClock">00:00:00 AM</div>
</header>

<div class="container">
    <div class="stats-bar">
        <div class="stat-item">Status: <span id="meetingStatus">Ready</span></div>
        <div class="stat-item">Timer: <span id="timer">00:00</span></div>
    </div>

    <div class="controls" id="controlPanel">
        <input type="text" id="waNum" class="host-only" placeholder="Client WhatsApp (eg: 44...)">
        <button class="btn-wa host-only" onclick="sendInvite()"><i class="fab fa-whatsapp"></i> Invite Partner</button>
        
        <select id="myLang">
            <option value="en-US">My Lang: English</option>
            <option value="hi-IN">My Lang: Hindi</option>
            <option value="ur-PK">My Lang: Urdu</option>
            <option value="bn-IN">My Lang: Bengali</option>
            <option value="ar-SA">My Lang: Arabic</option>
        </select>

        <select id="targetLang">
            <option value="en">Translate to: English</option>
            <option value="ur">Translate to: Urdu</option>
            <option value="hi">Translate to: Hindi</option>
            <option value="ar">Translate to: Arabic</option>
        </select>

        <button id="joinBtn" onclick="joinCall()"><i class="fas fa-video"></i> Start Meeting</button>
        
        <button class="btn-rec host-only" id="recBtn" onclick="toggleRecording()" disabled><i class="fas fa-circle"></i> Record</button>
    </div>

    <div class="video-grid">
        <div class="video-wrapper"><div id="local-player" style="width:100%;height:100%"></div><div class="tag" id="localTag">YOU</div></div>
        <div class="video-wrapper"><div id="remote-player" style="width:100%;height:100%"></div><div class="tag" id="remoteTag">PARTNER</div></div>
    </div>

    <div id="transBox">
        <div id="originalText" style="color: #8696a0; font-size: 0.9rem;">Waiting for speech...</div>
        <div id="transText">Translation Ready</div>
    </div>
</div>

<script>
    const APP_ID = "7ca9b8060fee4eb6a94768bc1b91334d";
    let channel = "Alam_Global_Meeting";
    let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
    let localTracks = { v: null, a: null };
    let recorder, chunks = [], startTime, timerInterval;

    // --- CHECK IF CLIENT ---
    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('type') === 'client') {
            document.body.classList.add('client-view');
            document.getElementById('localTag').innerText = "CLIENT";
            document.getElementById('remoteTag').innerText = "MD ALAM";
        }
    };

    // --- Live Clock ---
    setInterval(() => {
        document.getElementById('liveClock').innerText = new Date().toLocaleTimeString();
    }, 1000);

    function startTimer() {
        startTime = Date.now();
        timerInterval = setInterval(() => {
            let diff = Math.floor((Date.now() - startTime) / 1000);
            let m = Math.floor(diff / 60).toString().padStart(2, '0');
            let s = (diff % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${s}`;
        }, 1000);
    }

    function sendInvite() {
        const num = document.getElementById('waNum').value;
        if(!num) return alert("Number daalein!");
        // Is link mein 'type=client' add kiya gaya hai
        const url = window.location.href.split('?')[0] + "?type=client";
        window.open(`https://wa.me/${num}?text=${encodeURIComponent("Join my AI meeting: " + url)}`, '_blank');
    }

    async function joinCall() {
        try {
            await client.join(APP_ID, channel, null);
            localTracks.a = await AgoraRTC.createMicrophoneAudioTrack();
            localTracks.v = await AgoraRTC.createCameraVideoTrack();
            localTracks.v.play("local-player");
            await client.publish([localTracks.a, localTracks.v]);
            
            client.on("user-published", async (u, t) => {
                await client.subscribe(u, t);
                if (t === "video") u.videoTrack.play("remote-player");
                if (t === "audio") u.audioTrack.play();
            });

            document.getElementById('meetingStatus').innerText = "LIVE";
            document.getElementById('joinBtn').disabled = true;
            document.getElementById('recBtn').disabled = false;
            startTimer();
            startAI();
        } catch(e) { alert("Camera allow karein!"); }
    }

    function startAI() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        const rec = new Speech();
        rec.lang = document.getElementById('myLang').value;
        rec.continuous = true;
        rec.start();
        rec.onresult = async (e) => {
            const input = e.results[e.results.length - 1][0].transcript;
            document.getElementById('originalText').innerText = "Detected: " + input;
            const target = document.getElementById('targetLang').value;
            const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${target}&dt=t&q=${encodeURI(input)}`);
            const data = await res.json();
            const translated = data[0][0][0];
            document.getElementById('transText').innerText = translated;
            let talk = new SpeechSynthesisUtterance(translated);
            talk.lang = target;
            window.speechSynthesis.speak(talk);
        };
    }

    function toggleRecording() {
        const btn = document.getElementById('recBtn');
        if(!recorder || recorder.state === "inactive") {
            const stream = new MediaStream([localTracks.v.getMediaStreamTrack(), localTracks.a.getMediaStreamTrack()]);
            recorder = new MediaRecorder(stream);
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, {type: 'video/webm'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `Meeting.webm`;
                a.click();
            };
            recorder.start();
            btn.classList.add('recording');
            btn.innerHTML = "<i class='fas fa-stop'></i> Stop";
        } else {
            recorder.stop();
            btn.classList.remove('recording');
        }
    }
</script>
</body>
</html>
