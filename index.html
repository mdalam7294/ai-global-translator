<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Global Bridge - Professional Video Translator</title>
    
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --primary: #00a884; --bg: #0b141a; --panel: #111b21; --accent: #007bff; --text: #e9edef; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--bg); color: var(--text); }
        
        header { background: var(--panel); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); }
        .logo { font-size: 1.5rem; font-weight: 600; color: var(--primary); }
        .logo span { color: #fff; }

        .container { padding: 20px; max-width: 1300px; margin: auto; }

        /* Controls Panel */
        .controls { background: var(--panel); padding: 20px; border-radius: 15px; display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        input, select, button { padding: 12px; border-radius: 8px; border: 1px solid #2a3942; background: #2a3942; color: white; font-size: 14px; outline: none; }
        
        button { cursor: pointer; font-weight: 600; border: none; min-width: 140px; transition: 0.3s; }
        .btn-join { background: var(--accent); }
        .btn-wa { background: var(--primary); }
        .btn-rec { background: transparent; border: 1px solid #fff; }
        .recording { background: #dc3545 !important; animation: pulse 1.5s infinite; }

        /* Video Grid */
        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; min-height: 450px; }
        .video-card { background: #000; border-radius: 18px; position: relative; overflow: hidden; border: 2px solid #222e35; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        .tag { position: absolute; top: 15px; left: 15px; background: rgba(0,168,132,0.8); padding: 4px 12px; border-radius: 6px; font-size: 0.8rem; z-index: 10; font-weight: 600; }

        /* Captions Section */
        .captions-box { background: rgba(0,0,0,0.5); padding: 20px; border-radius: 15px; margin-top: 25px; text-align: center; border-bottom: 4px solid var(--primary); }
        #transText { color: #00ffcc; font-size: 1.6rem; font-weight: 600; text-shadow: 0 0 10px rgba(0,255,204,0.3); }

        @keyframes pulse { 50% { opacity: 0.6; } }
        @media (max-width: 850px) { .video-grid { grid-template-columns: 1fr; } .video-card { aspect-ratio: 16/9; } }
    </style>
</head>
<body>

<header>
    <div class="logo">Global AI Bridge <span>| Md Alam</span></div>
    <div id="status" style="font-size: 0.8rem; color: #8696a0;">System: Ready to Connect</div>
</header>

<div class="container">
    <div class="controls">
        <input type="text" id="waPhone" placeholder="Partner WhatsApp (eg: 44...)">
        <button class="btn-wa" onclick="shareLink()"><i class="fab fa-whatsapp"></i> Send Invite</button>
        
        <select id="mySpeech">
            <option value="hi-IN">I Speak: Hindi</option>
            <option value="en-US">I Speak: English</option>
            <option value="bn-IN">I Speak: Bengali</option>
            <option value="ur-PK">I Speak: Urdu</option>
            <option value="ar-SA">I Speak: Arabic</option>
            <option value="es-ES">I Speak: Spanish</option>
            <option value="fr-FR">I Speak: French</option>
            <option value="zh-CN">I Speak: Chinese</option>
        </select>

        <select id="toSpeech">
            <option value="en">Translate to: English</option>
            <option value="hi">Translate to: Hindi</option>
            <option value="ar">Translate to: Arabic</option>
            <option value="es">Translate to: Spanish</option>
            <option value="de">Translate to: German</option>
            <option value="ru">Translate to: Russian</option>
            <option value="ja">Translate to: Japanese</option>
        </select>

        <button class="btn-join" id="mainBtn" onclick="startCall()">Start Meeting</button>
        <button class="btn-rec" id="recBtn" onclick="handleRecording()" disabled><i class="fas fa-circle"></i> Record</button>
    </div>

    <div class="video-grid">
        <div class="video-card"><div id="me" style="width:100%;height:100%"></div><div class="tag">HOST: MD ALAM</div></div>
        <div class="video-card"><div id="partner" style="width:100%;height:100%"></div><div class="tag">REMOTE PARTNER</div></div>
    </div>

    <div class="captions-box">
        <div id="myText" style="color: #8696a0; font-size: 0.9rem;">Voice detection active...</div>
        <div id="transText">AI Translation Output</div>
    </div>
</div>

<script>
    const AGORA_ID = "7ca9b8060fee4eb6a94768bc1b91334d";
    const ROOM = "AI_Business_Executive";
    let rtc = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
    let local = { audio: null, video: null };
    let rec, data = [];

    // WhatsApp Invitation
    function shareLink() {
        const p = document.getElementById('waPhone').value;
        if(!p) return alert("Phone number zaroori hai!");
        const url = window.location.href.split('?')[0] + "?join=auto";
        const txt = `Hello! Join my AI Video Call here: ${url}`;
        window.open(`https://wa.me/${p}?text=${encodeURIComponent(txt)}`, '_blank');
    }

    // Auto-Join for Partner
    window.onload = () => {
        if(new URLSearchParams(window.location.search).get('join') === 'auto') {
            startCall();
        }
    };

    async function startCall() {
        try {
            document.getElementById('status').innerText = "Accessing Camera...";
            await rtc.join(AGORA_ID, ROOM, null);
            
            [local.audio, local.video] = await AgoraRTC.createMicrophoneAndCameraTracks();
            local.video.play("me");
            await rtc.publish([local.audio, local.video]);

            rtc.on("user-published", async (user, type) => {
                await rtc.subscribe(user, type);
                if (type === "video") user.videoTrack.play("partner");
                if (type === "audio") user.audioTrack.play();
            });

            document.getElementById('status').innerText = "LIVE | Translation Syncing";
            document.getElementById('recBtn').disabled = false;
            runAI();
        } catch (err) { alert("Please allow Camera & Mic access."); }
    }

    function runAI() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        const listen = new SR();
        listen.lang = document.getElementById('mySpeech').value;
        listen.continuous = true;
        listen.start();

        listen.onresult = async (e) => {
            const raw = e.results[e.results.length - 1][0].transcript;
            document.getElementById('myText').innerText = "Detected: " + raw;
            
            const lang = document.getElementById('toSpeech').value;
            const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${lang}&dt=t&q=${encodeURI(raw)}`);
            const json = await res.json();
            const result = json[0][0][0];

            document.getElementById('transText').innerText = result;
            let speak = new SpeechSynthesisUtterance(result);
            speak.lang = lang;
            window.speechSynthesis.speak(speak);
        };
    }

    function handleRecording() {
        const b = document.getElementById('recBtn');
        if(!b.classList.contains('recording')) {
            const s = new MediaStream([local.video.getMediaStreamTrack(), local.audio.getMediaStreamTrack()]);
            rec = new MediaRecorder(s);
            rec.ondataavailable = e => data.push(e.data);
            rec.onstop = () => {
                const blob = new Blob(data, {type: 'video/webm'});
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `Meeting_${Date.now()}.webm`;
                link.click();
            };
            rec.start();
            b.classList.add('recording');
            b.innerHTML = "<i class='fas fa-stop'></i> Stop";
        } else {
            rec.stop();
            b.classList.remove('recording');
            b.innerHTML = "<i class='fas fa-circle'></i> Record";
        }
    }
</script>
</body>
</html>
