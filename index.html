<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global AI Bridge | Screen Share Pro</title>
    
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --primary: #00a884; --bg: #0b141a; --panel: #111b21; --accent: #007bff; --text: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        
        header { 
            background: var(--panel); padding: 12px 20px; 
            border-bottom: 2px solid var(--primary); 
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo-box { display: flex; align-items: center; gap: 10px; }
        .logo-box img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary); }

        .container { padding: 15px; max-width: 1400px; margin: auto; }

        /* Zoom Style Grid */
        #video-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 15px; margin-bottom: 20px;
        }
        .player-card { 
            background: #000; border-radius: 12px; aspect-ratio: 16/9; 
            position: relative; overflow: hidden; border: 2px solid #222e35;
        }
        .user-tag { 
            position: absolute; bottom: 8px; left: 8px; 
            background: rgba(0,0,0,0.7); padding: 3px 8px; 
            border-radius: 4px; font-size: 0.7rem; color: var(--primary); z-index: 5;
        }

        /* Controls */
        .tools { 
            background: var(--panel); padding: 15px; border-radius: 12px; 
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
        }
        
        /* Visibility Logic */
        .host-tools { display: flex; gap: 10px; }
        .is-client .host-tools { display: none !important; }

        select, input, button { 
            padding: 10px 14px; border-radius: 6px; border: 1px solid #2a3942; 
            background: #2a3942; color: white; font-size: 13px; outline: none;
        }
        
        button { background: var(--accent); cursor: pointer; font-weight: 600; border: none; transition: 0.2s; display: flex; align-items: center; gap: 6px; }
        button:hover { transform: translateY(-1px); filter: brightness(1.2); }
        .btn-wa { background: var(--primary); }
        .btn-screen { background: #6c757d; }
        .btn-rec { background: transparent; border: 1px solid #fff; }

        /* Translation Display */
        .caption-area { background: rgba(0,0,0,0.4); padding: 20px; border-radius: 12px; margin-top: 15px; border-left: 4px solid var(--primary); text-align: center; }
        #live-translated { color: #00ffcc; font-size: 1.5rem; font-weight: 600; }
    </style>
</head>
<body id="app-root">

<header>
    <div class="logo-box">
        <img src="https://i.ibb.co/vzYp6YV/office-logo.jpg" alt="Md Alam Logo">
        <div><b style="font-size: 1rem;">Global AI Bridge</b><br><small style="color:#8696a0">Md Alam Solutions</small></div>
    </div>
    <div id="clock" style="color: var(--primary); font-weight: 600;">00:00:00</div>
</header>

<div class="container">
    <div id="video-grid">
        <div class="player-card" id="local-container">
            <div id="local-stream" style="width:100%;height:100%"></div>
            <div class="user-tag" id="my-tag">YOU (HOST)</div>
        </div>
    </div>

    <div class="tools">
        <div class="host-tools">
            <input type="text" id="target-phone" placeholder="WhatsApp Number">
            <button class="btn-wa" onclick="sendMeetingInvite()"><i class="fab fa-whatsapp"></i> Invite</button>
            <button class="btn-screen" id="screen-btn" onclick="toggleScreenShare()"><i class="fas fa-desktop"></i> Share Screen</button>
        </div>

        <select id="speak-lang">
            <option value="en-US">I Speak: English</option>
            <option value="hi-IN">I Speak: Hindi</option>
            <option value="ur-PK">I Speak: Urdu</option>
        </select>

        <select id="hear-lang">
            <option value="en">Hear in: English</option>
            <option value="hi">Hear in: Hindi</option>
            <option value="ur">Hear in: Urdu</option>
        </select>

        <button id="join-btn" onclick="startGlobalMeeting()"><i class="fas fa-video"></i> Join</button>
        
        <div class="host-tools">
            <button class="btn-rec" id="rec-btn" onclick="startRecordingMeeting()" disabled><i class="fas fa-circle"></i> Record</button>
        </div>
    </div>

    <div class="caption-area">
        <div id="detect-text" style="color: #8696a0; font-size: 0.8rem; margin-bottom: 5px;">Awaaz pehchan rahe hain...</div>
        <div id="live-translated">Translation will appear here...</div>
    </div>
</div>

<script>
    const APP_ID = "7ca9b8060fee4eb6a94768bc1b91334d";
    const ROOM = "Md_Alam_Global_Room";
    let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
    let localTracks = { video: null, audio: null, screen: null };
    let isSharing = false;

    window.onload = () => {
        if(new URLSearchParams(window.location.search).get('role') === 'client') {
            document.getElementById('app-root').classList.add('is-client');
            document.getElementById('my-tag').innerText = "GUEST CLIENT";
        }
        setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);
        
        // Auto-request camera
        navigator.mediaDevices.getUserMedia({video: true, audio: true}).catch(() => alert("Camera Access Required!"));
    };

    async function startGlobalMeeting() {
        await client.join(APP_ID, ROOM, null);
        localTracks.audio = await AgoraRTC.createMicrophoneAudioTrack();
        localTracks.video = await AgoraRTC.createCameraVideoTrack();
        
        localTracks.video.play("local-stream");
        await client.publish([localTracks.audio, localTracks.video]);

        client.on("user-published", async (user, type) => {
            await client.subscribe(user, type);
            if (type === "video") {
                const div = document.createElement("div");
                div.id = user.uid; div.className = "player-card";
                div.innerHTML = `<div class="user-tag">PARTNER</div>`;
                document.getElementById("video-grid").append(div);
                user.videoTrack.play(div.id);
            }
            if (type === "audio") user.audioTrack.play();
        });

        client.on("user-left", (user) => { document.getElementById(user.uid)?.remove(); });

        document.getElementById('join-btn').innerText = "LIVE";
        document.getElementById('join-btn').disabled = true;
        if(document.getElementById('rec-btn')) document.getElementById('rec-btn').disabled = false;
        
        activateAI();
    }

    // --- SCREEN SHARE LOGIC ---
    async function toggleScreenShare() {
        if (!isSharing) {
            localTracks.screen = await AgoraRTC.createScreenVideoTrack();
            await client.unpublish(localTracks.video);
            await client.publish(localTracks.screen);
            localTracks.screen.play("local-stream");
            document.getElementById('screen-btn').innerHTML = "<i class='fas fa-stop'></i> Stop Sharing";
            isSharing = true;

            localTracks.screen.on("track-ended", () => stopScreenShare());
        } else {
            stopScreenShare();
        }
    }

    async function stopScreenShare() {
        await client.unpublish(localTracks.screen);
        localTracks.screen.close();
        await client.publish(localTracks.video);
        localTracks.video.play("local-stream");
        document.getElementById('screen-btn').innerHTML = "<i class='fas fa-desktop'></i> Share Screen";
        isSharing = false;
    }

    function activateAI() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        const ai = new Speech();
        ai.lang = document.getElementById('speak-lang').value;
        ai.continuous = true;
        ai.start();

        ai.onresult = async (e) => {
            const raw = e.results[e.results.length - 1][0].transcript;
            document.getElementById('detect-text').innerText = "Me: " + raw;
            const target = document.getElementById('hear-lang').value;
            const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${target}&dt=t&q=${encodeURI(raw)}`);
            const data = await res.json();
            const result = data[0][0][0];

            document.getElementById('live-translated').innerText = result;
            let speak = new SpeechSynthesisUtterance(result);
            speak.lang = target;
            window.speechSynthesis.speak(speak);
        };
    }

    function sendMeetingInvite() {
        const p = document.getElementById('target-phone').value;
        const link = window.location.href.split('?')[0] + "?role=client";
        window.open(`https://wa.me/${p}?text=Hi, please join my meeting: ${link}`, '_blank');
    }
</script>
</body>
</html>
